# ============================================================
# Server
# ============================================================
server.port=8080

# ============================================================
# PostgreSQL DataSource
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/piggyback_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# Initialise data.sql after JPA schema creation
# ============================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================================
# JWT Configuration
# ============================================================
# Secret must be >= 256 bits (32+ chars) for HS256
app.jwt.secret=piggyback-super-secret-key-that-is-at-least-256-bits-long-for-HS256
app.jwt.expiration-ms=86400000

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origin=http://localhost:4173
